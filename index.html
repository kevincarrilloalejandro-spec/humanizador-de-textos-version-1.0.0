<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrada</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030303;
            --gold-dim: #c9a84c;
            --gold-glow: rgba(201, 168, 76, 0.4);
            --gold-fill: rgba(201, 168, 76, 0.15);
            --text-white: rgba(255, 255, 255, 0.8);
            --text-dim: rgba(255, 255, 255, 0.25);
            --font-main: 'Cinzel', serif;
            --font-code: 'Space Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: var(--font-main);
            color: var(--text-white);
            cursor: none; /* Custom cursor */
        }

        /* Noise Texture */
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.03;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

        /* Ambient Fog */
        .fog-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50vh;
            overflow: hidden;
            pointer-events: none;
            z-index: 1;
            opacity: 0.4;
            mask-image: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,0));
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,0));
        }

        .fog {
            position: absolute;
            width: 200%;
            height: 100%;
            background: url('https://raw.githubusercontent.com/danielstuart14/CSS_FOG_ANIMATION/master/fog1.png') repeat-x;
            background-size: 50% 100%;
            bottom: 0;
            animation: moveFog 60s linear infinite;
            filter: blur(10px) brightness(0.2);
            opacity: 0.5;
        }
        
        .fog2 {
            position: absolute;
            width: 200%;
            height: 100%;
            background: url('https://raw.githubusercontent.com/danielstuart14/CSS_FOG_ANIMATION/master/fog2.png') repeat-x;
            background-size: 50% 100%;
            bottom: 0;
            animation: moveFog 40s linear infinite reverse;
            filter: blur(8px) brightness(0.2);
            opacity: 0.4;
        }

        @keyframes moveFog {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Light Rays */
        .rays {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            pointer-events: none;
            z-index: 1;
            background: radial-gradient(circle at 50% 0%, rgba(201, 168, 76, 0.05) 0%, transparent 60%);
            animation: breathe 10s ease-in-out infinite alternate;
        }
        
        .ray {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100vh;
            background: linear-gradient(to bottom, rgba(201, 168, 76, 0.1), transparent);
            transform-origin: top;
            filter: blur(8px);
        }
        
        .ray:nth-child(1) { transform: rotate(15deg); animation: sway 15s ease-in-out infinite alternate; }
        .ray:nth-child(2) { transform: rotate(-10deg); left: 40%; animation: sway 12s ease-in-out infinite alternate-reverse; }

        @keyframes breathe {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }
        
        @keyframes sway {
            0% { transform: rotate(15deg); opacity: 0.3; }
            100% { transform: rotate(25deg); opacity: 0.8; }
        }

        /* Particles */
        #particles-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* Form Container */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Staggered Fade-in Animation */
        .fade-in {
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .delay-1 { animation-delay: 1.5s; }
        .delay-2 { animation-delay: 2.5s; }
        .delay-3 { animation-delay: 3s; }
        .delay-4 { animation-delay: 3.5s; }
        .delay-5 { animation-delay: 4.5s; }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Form Elements */
        .top-text {
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 3rem;
            text-align: center;
            transition: text-shadow 0.5s ease;
        }

        .top-text:hover, .bottom-text:hover {
            text-shadow: 0 0 10px var(--gold-glow);
            color: rgba(201, 168, 76, 0.6);
        }

        .input-group {
            width: 100%;
            margin-bottom: 2.5rem;
            position: relative;
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(201, 168, 76, 0.3);
            color: var(--text-white);
            padding: 0.5rem 0;
            font-size: 1rem;
            outline: none;
            transition: all 0.4s ease;
            letter-spacing: 0.1em;
            cursor: none;
        }

        input.code-input {
            font-family: var(--font-code);
            letter-spacing: 0.2em;
            text-align: center;
        }

        input::placeholder {
            color: var(--text-dim);
            font-family: var(--font-main);
            letter-spacing: 0.1em;
            text-transform: lowercase;
        }
        
        input.code-input::placeholder {
            font-family: var(--font-code);
            letter-spacing: 0.3em;
        }

        input:focus {
            border-bottom-color: var(--gold-dim);
            box-shadow: 0 1px 10px -2px var(--gold-glow);
        }

        /* Char highlight animation for code input */
        @keyframes charFlash {
            0% { text-shadow: 0 0 15px var(--gold-dim); color: #fff; }
            100% { text-shadow: none; color: var(--text-white); }
        }
        
        .char-flash {
            animation: charFlash 0.5s ease forwards;
        }

        .btn-enter {
            margin-top: 1rem;
            padding: 1rem 3rem;
            background: transparent;
            border: 1px solid var(--gold-dim);
            color: var(--gold-dim);
            font-family: var(--font-main);
            font-size: 0.9rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            cursor: none;
            position: relative;
            overflow: hidden;
            transition: all 0.8s ease;
            opacity: 0.8;
        }

        .btn-enter::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(201, 168, 76, 0.3), transparent);
            transform: skewX(-20deg);
            transition: all 0.5s ease;
        }

        .btn-enter:hover {
            background-color: var(--gold-fill);
            box-shadow: 0 0 20px -5px var(--gold-glow);
            opacity: 1;
        }

        .btn-enter:hover::before {
            animation: shine 1.5s ease infinite;
        }

        @keyframes shine {
            100% { left: 200%; }
        }

        .bottom-text {
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            color: var(--text-dim);
            margin-top: 4rem;
            text-align: center;
            text-transform: uppercase;
            transition: all 0.5s ease;
        }

        /* Custom Cursor */
        #cursor-dot {
            position: fixed;
            top: 0;
            left: 0;
            width: 4px;
            height: 4px;
            background-color: var(--gold-dim);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 8px 2px var(--gold-glow);
            transition: width 0.2s, height 0.2s, background-color 0.2s;
        }

        #cursor-trail {
            position: fixed;
            top: 0;
            left: 0;
            width: 20px;
            height: 20px;
            border: 1px solid rgba(201, 168, 76, 0.3);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out, opacity 0.5s ease;
        }

        /* Hover states for cursor */
        body.hovering-input #cursor-dot {
            width: 2px;
            height: 20px;
            border-radius: 0;
            background-color: var(--gold-dim);
        }
        
        body.hovering-btn #cursor-dot {
            transform: translate(-50%, -50%) scale(2);
            background-color: transparent;
            border: 1px solid var(--gold-dim);
            box-shadow: inset 0 0 5px var(--gold-glow);
        }

        /* Shake and Error Animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .shake-animation {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        .error-message {
            color: rgba(220, 50, 50, 0.7);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            margin-top: 1rem;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s ease;
            position: absolute;
            bottom: -30px;
            width: 100%;
        }

        /* Success Overlay */
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 20000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
        }

        .success-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .success-text {
            color: var(--gold-dim);
            font-size: 1.5rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--gold-glow);
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    
    <div class="rays">
        <div class="ray"></div>
        <div class="ray"></div>
    </div>
    
    <canvas id="particles-canvas"></canvas>
    
    <div class="fog-container">
        <div class="fog"></div>
        <div class="fog2"></div>
    </div>

    <div class="login-wrapper">
        <div class="top-text fade-in delay-1">Solo los invitados pueden entrar</div>
        
        <div class="input-group fade-in delay-2">
            <input type="email" id="email" placeholder="tu correo" autocomplete="off" spellcheck="false">
        </div>
        
        <div class="input-group fade-in delay-3">
            <input type="text" id="code" class="code-input" placeholder="_ _ _ _ - _ _ _ _" maxlength="9" autocomplete="off" spellcheck="false">
        </div>
        
        <button class="btn-enter fade-in delay-4">Entrar</button>
        <div id="error-msg" class="error-message"></div>
        
        <div class="bottom-text fade-in delay-5">¿No tienes invitación? Permanece en las sombras.</div>
    </div>

    <!-- Success Overlay -->
    <div id="success-overlay" class="success-overlay">
        <div id="success-text" class="success-text"></div>
    </div>

    <!-- Custom Cursor elements -->
    <div id="cursor-dot"></div>
    <div id="cursor-trail"></div>

    <script>
        // Form formatting
        const codeInput = document.getElementById('code');
        const emailInput = document.getElementById('email');
        const btnEnter = document.querySelector('.btn-enter');
        
        codeInput.addEventListener('input', function(e) {
            // Remove non-alphanumeric chars
            let val = this.value.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
            
            // Add hyphen
            if (val.length > 4) {
                val = val.substring(0, 4) + '-' + val.substring(4, 8);
            }
            
            // Add flash effect class momentarily to input
            this.classList.remove('char-flash');
            void this.offsetWidth; // trigger reflow
            this.classList.add('char-flash');
            
            this.value = val;
        });

        // Custom Cursor Logic
        const dot = document.getElementById('cursor-dot');
        const trail = document.getElementById('cursor-trail');
        const interactables = document.querySelectorAll('input, button');
        
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let trailX = mouseX;
        let trailY = mouseY;
        
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            dot.style.transform = `translate(${mouseX}px, ${mouseY}px)`;
        });

        // Smooth trailing animation
        function animateCursor() {
            // Easing for trail
            trailX += (mouseX - trailX) * 0.15;
            trailY += (mouseY - trailY) * 0.15;
            
            trail.style.transform = `translate(${trailX}px, ${trailY}px)`;
            
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        // Cursor hover states
        [emailInput, codeInput].forEach(el => {
            el.addEventListener('mouseenter', () => document.body.classList.add('hovering-input'));
            el.addEventListener('mouseleave', () => document.body.classList.remove('hovering-input'));
        });

        btnEnter.addEventListener('mouseenter', () => document.body.classList.add('hovering-btn'));
        btnEnter.addEventListener('mouseleave', () => document.body.classList.remove('hovering-btn'));

        // Error tracking & Login Event
        let failedAttempts = parseInt(sessionStorage.getItem('failed_attempts') || '0');
        let blockUntil = parseInt(sessionStorage.getItem('block_until') || '0');

        function showError(msg) {
            const wrapper = document.querySelector('.login-wrapper');
            const errorDiv = document.getElementById('error-msg');
            
            wrapper.classList.remove('shake-animation');
            void wrapper.offsetWidth;
            wrapper.classList.add('shake-animation');
            
            errorDiv.textContent = msg;
            errorDiv.style.opacity = '1';
            
            setTimeout(() => {
                errorDiv.style.opacity = '0';
            }, 3000);
        }

        function typeWriter(element, text, i, cb) {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                setTimeout(() => typeWriter(element, text, i + 1, cb), 80);
            } else if (cb) {
                setTimeout(cb, 500);
            }
        }

        function mostrarAnimacionAcceso(cb) {
            const overlay = document.getElementById('success-overlay');
            const textEl = document.getElementById('success-text');
            
            overlay.classList.add('active');
            
            setTimeout(() => {
                textEl.style.opacity = '1';
                typeWriter(textEl, "Bienvenido a las sombras...", 0, cb);
            }, 1000);
        }

        btnEnter.addEventListener('click', () => {
            const now = Date.now();
            if (now < blockUntil) {
                showError("Demasiados intentos. Las sombras te observan. Vuelve en unos minutos.");
                return;
            }

            const email = emailInput.value;
            const codigo = codeInput.value;

            if (!email || !codigo) {
                showError("Las sombras no te reconocen.");
                return;
            }

            const invitaciones = JSON.parse(localStorage.getItem('invitaciones') || '[]');
            
            const invitacion = invitaciones.find(inv => 
                inv.email.toLowerCase() === email.toLowerCase().trim() &&
                inv.codigo === codigo.trim() &&
                inv.activo === true
            );

            if (!invitacion) {
                failedAttempts++;
                sessionStorage.setItem('failed_attempts', failedAttempts.toString());
                
                if (failedAttempts >= 5) {
                    blockUntil = now + 10 * 60 * 1000;
                    sessionStorage.setItem('block_until', blockUntil.toString());
                    showError("Demasiados intentos. Las sombras te observan. Vuelve en unos minutos.");
                } else {
                    showError("Las sombras no te reconocen.");
                }
                return;
            }

            failedAttempts = 0;
            sessionStorage.setItem('failed_attempts', '0');
            
            invitacion.usado = true;
            invitacion.fechaUso = new Date().toISOString();
            localStorage.setItem('invitaciones', JSON.stringify(invitaciones));
            
            const usuarios = JSON.parse(localStorage.getItem('usuarios_registrados') || '[]');
            const yaExiste = usuarios.find(u => u.email.toLowerCase() === email.toLowerCase().trim());
            
            if (!yaExiste) {
                usuarios.push({
                    email: email.toLowerCase().trim(),
                    nombre: invitacion.nombre || '',
                    fechaRegistro: new Date().toISOString(),
                    ultimoAcceso: new Date().toISOString()
                });
            } else {
                yaExiste.ultimoAcceso = new Date().toISOString();
            }
            localStorage.setItem('usuarios_registrados', JSON.stringify(usuarios));
            
            sessionStorage.setItem('sesion', JSON.stringify({
                email: email.toLowerCase().trim(),
                nombre: invitacion.nombre || email,
                fechaLogin: new Date().toISOString()
            }));

            mostrarAnimacionAcceso(() => {
                document.body.style.transition = 'opacity 1s ease';
                document.body.style.opacity = '0';
                setTimeout(() => window.location.href = './dashboard.html', 1000);
            });
        });

        // Secret shortcut Shift+Alt+A
        document.addEventListener('keydown', (e) => {
            if (e.shiftKey && e.altKey && e.key.toLowerCase() === 'a') {
                window.location.href = './admin.html';
            }
        });

        // Particles System
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        
        window.addEventListener('resize', resize);
        resize();
        
        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 1.5 + 0.1;
                this.speedX = (Math.random() - 0.5) * 0.2;
                this.speedY = (Math.random() - 0.5) * 0.2 - 0.1; // slight upward drift
                this.baseAlpha = Math.random() * 0.4 + 0.1;
                this.alpha = this.baseAlpha;
                this.oscillationSpeed = Math.random() * 0.02 + 0.01;
                this.angle = Math.random() * Math.PI * 2;
            }
            
            update() {
                // Mouse interaction - slight repel
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < 100) {
                    this.x -= (dx / distance) * 0.5;
                    this.y -= (dy / distance) * 0.5;
                    this.alpha = Math.min(this.baseAlpha * 2, 0.8); // glow slightly when near mouse
                } else {
                    // Normal animation
                    this.angle += this.oscillationSpeed;
                    this.alpha = this.baseAlpha + Math.sin(this.angle) * 0.1;
                }
                
                this.x += this.speedX + Math.sin(this.angle) * 0.2;
                this.y += this.speedY;
                
                // Wrap around
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
            }
            
            draw() {
                ctx.fillStyle = `rgba(201, 168, 76, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // Create particles
        const particleCount = Math.min(window.innerWidth / 10, 150);
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }
        
        function animateParticles() {
            ctx.clearRect(0, 0, width, height);
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            
            requestAnimationFrame(animateParticles);
        }
        
        animateParticles();
    </script>
</body>
</html>
