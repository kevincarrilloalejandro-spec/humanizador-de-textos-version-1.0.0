<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Portal Oscuro</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --gold-dim: #c9a84c;
            --gold-glow: rgba(201, 168, 76, 0.4);
            --gold-fill: rgba(201, 168, 76, 0.15);
            --text-white: rgba(255, 255, 255, 0.85);
            --text-error: rgba(220, 50, 50, 0.6);
            --font-main: 'Cinzel', serif;
            --font-code: 'Space Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        
        body, html {
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Ambient effects */
        .noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999; opacity: 0.03;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .light-rays {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(
                to right,
                rgba(255,255,255,0) 0%,
                rgba(201, 168, 76, 0.015) 10%,
                rgba(255,255,255,0) 20%
            );
            transform: rotate(-15deg) scale(1.5);
            pointer-events: none;
            opacity: 0.6;
            animation: raysMove 15s linear infinite alternate;
            z-index: 0;
        }

        @keyframes raysMove {
            from { transform: rotate(-15deg) scale(1.5) translateX(-5%); }
            to { transform: rotate(-15deg) scale(1.5) translateX(5%); }
        }

        .fog {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(to top, rgba(201, 168, 76, 0.04), transparent);
            filter: blur(25px);
            pointer-events: none;
            animation: fogBreathe 8s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes fogBreathe {
            from { opacity: 0.4; transform: scaleY(1); }
            to { opacity: 0.8; transform: scaleY(1.3); }
        }

        #particles {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }

        /* Cursor */
        .cursor-dot {
            position: fixed; top: 0; left: 0; width: 6px; height: 6px;
            background: var(--gold-dim); border-radius: 50%;
            pointer-events: none; z-index: 10000;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px var(--gold-dim);
            transition: transform 0.1s ease;
        }
        
        .trail {
            position: fixed; width: 4px; height: 4px;
            background: var(--gold-dim); border-radius: 50%;
            pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%);
            opacity: 0.8;
            transition: opacity 0.5s ease;
        }

        /* Container & Form */
        .portal-container {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            opacity: 0; animation: slowFadeIn 2s ease forwards 0.5s;
            width: 100%; max-width: 350px;
        }

        @keyframes slowFadeIn {
            to { opacity: 1; }
        }

        .title {
            color: var(--gold-dim); opacity: 0.5;
            text-transform: uppercase; font-size: 0.75rem;
            letter-spacing: 0.4em; margin-bottom: 3.5rem;
            text-align: center;
        }

        .form-area {
            display: flex; flex-direction: column; gap: 2.5rem;
            width: 100%;
        }

        .input-group { position: relative; }
        
        input {
            width: 100%; background: transparent; border: none;
            border-bottom: 1px solid rgba(201, 168, 76, 0.3);
            color: var(--text-white); padding: 0.5rem 0;
            font-size: 1rem; outline: none; transition: all 0.4s ease;
            font-family: var(--font-main); text-align: center;
        }

        input::placeholder {
            color: rgba(255,255,255,0.2); letter-spacing: 0.1em;
            text-transform: lowercase; font-family: var(--font-main);
        }

        input:focus {
            border-bottom-color: var(--gold-dim);
            box-shadow: 0 1px 15px -5px var(--gold-glow);
        }

        input.code-input {
            font-family: var(--font-code); letter-spacing: 0.3em;
            text-transform: uppercase;
        }

        input.code-input::placeholder {
            font-family: var(--font-code); letter-spacing: 0.3em;
        }

        /* Typing Flash Effect */
        .char-flash {
            animation: charGlow 0.3s ease;
        }

        @keyframes charGlow {
            0% { text-shadow: 0 0 15px var(--gold-dim); color: var(--gold-dim); }
            100% { text-shadow: none; color: var(--text-white); }
        }

        .btn-enter {
            background: transparent; border: 1px solid var(--gold-dim);
            color: var(--gold-dim); padding: 0.8rem 2rem;
            font-family: var(--font-main); font-size: 0.9rem;
            text-transform: uppercase; letter-spacing: 0.3em;
            margin-top: 1rem; position: relative; overflow: hidden;
            transition: all 0.5s ease;
        }

        .btn-enter::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(201, 168, 76, 0.4), transparent);
            transform: skewX(-25deg); transition: all 0.5s ease;
        }

        .btn-enter:hover {
            background: var(--gold-fill);
            box-shadow: 0 0 20px -5px var(--gold-glow);
            color: #fff;
        }

        .btn-enter:hover::before {
            left: 200%; transition: all 0.8s ease;
        }

        .footer-text {
            margin-top: 4.5rem; font-size: 0.65rem; color: rgba(255,255,255,0.15);
            letter-spacing: 0.2em; text-transform: uppercase; text-align: center;
        }

        .error-msg {
            position: absolute; bottom: 4rem; left: 50%; transform: translateX(-50%);
            color: var(--text-error); font-size: 0.75rem;
            letter-spacing: 0.2em; text-transform: uppercase;
            opacity: 0; transition: opacity 0.5s ease;
            text-shadow: 0 0 8px rgba(220,50,50,0.4);
            pointer-events: none;
            white-space: nowrap;
        }

        .shake {
            animation: shakeAnim 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shakeAnim {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-3px, 0, 0); }
            40%, 60% { transform: translate3d(3px, 0, 0); }
        }

        /* Success Overlay */
        #success-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; z-index: 100000;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 2s ease;
        }

        .success-text {
            color: var(--gold-dim); font-size: 1.2rem;
            letter-spacing: 0.3em; text-transform: uppercase;
            text-shadow: 0 0 15px var(--gold-glow);
        }
        
        span.typed-char {
            opacity: 0;
            animation: typeFade 0.1s forwards;
        }
        
        @keyframes typeFade { to { opacity: 1; } }

    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="light-rays"></div>
    <div class="fog"></div>
    <canvas id="particles"></canvas>

    <div class="cursor-dot" id="cursor"></div>

    <div class="portal-container" id="portal">
        <div class="title">SOLO LOS INVITADOS PUEDEN ENTRAR</div>
        
        <div class="form-area">
            <div class="input-group">
                <input type="email" id="in-email" placeholder="tu correo" autocomplete="off">
            </div>
            <div class="input-group">
                <input type="text" id="in-code" class="code-input" placeholder="_ _ _ _ - _ _ _ _" maxlength="9" autocomplete="off">
            </div>
            <button class="btn-enter" onclick="verificarAcceso()">ENTRAR</button>
        </div>

        <div class="footer-text">¿No tienes invitación? Permanece en las sombras.</div>
    </div>

    <div class="error-msg" id="error-msg">Las sombras no te reconocen.</div>

    <div id="success-overlay">
        <div class="success-text" id="success-text"></div>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN DE INVITACIONES ---
        function inicializarInvitaciones() {
            const invitaciones = JSON.parse(localStorage.getItem('invitaciones') || '[]');
            const yaExiste = invitaciones.find(inv => inv.codigo === '2410-2025');
            
            if (!yaExiste) {
                invitaciones.push({
                    id: 'inv-default-001',
                    email: '', 
                    nombre: '',
                    codigo: '2410-2025',
                    nota: 'Código de acceso general',
                    fechaCreacion: new Date().toISOString(),
                    usado: false,
                    fechaUso: null,
                    activo: true
                });
                localStorage.setItem('invitaciones', JSON.stringify(invitaciones));
            }
        }
        inicializarInvitaciones();

        // --- 2. CURSOR Y TRAIL ---
        const cursor = document.getElementById('cursor');
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            cursor.style.transform = `translate(${mouseX}px, ${mouseY}px)`;
            
            // Trail
            if (Math.random() > 0.4) {
                const trail = document.createElement('div');
                trail.className = 'trail';
                trail.style.left = `${mouseX}px`;
                trail.style.top = `${mouseY}px`;
                document.body.appendChild(trail);
                
                setTimeout(() => { trail.style.opacity = '0'; }, 50);
                setTimeout(() => { trail.remove(); }, 500);
            }
        });

        document.querySelectorAll('input, button').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.style.transform = `translate(${mouseX}px, ${mouseY}px) scale(1.5)`);
            el.addEventListener('mouseleave', () => cursor.style.transform = `translate(${mouseX}px, ${mouseY}px) scale(1)`);
        });

        // --- 3. PARTICULAS CANVAS ---
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let w, h, particlesArray;

        function initCanvas() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            particlesArray = [];
            for (let i = 0; i < 90; i++) {
                particlesArray.push(new Particle());
            }
        }

        class Particle {
            constructor() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.size = Math.random() * 1.5 + 0.5;
                this.density = (Math.random() * 15) + 1;
                this.alpha = Math.random() * 0.4 + 0.1;
                this.vx = (Math.random() - 0.5) * 0.6;
                this.vy = (Math.random() - 0.5) * 0.6;
            }
            draw() {
                ctx.fillStyle = `rgba(201, 168, 76, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                if (this.x < 0 || this.x > w) this.vx = -this.vx;
                if (this.y < 0 || this.y > h) this.vy = -this.vy;

                let dx = mouseX - this.x;
                let dy = mouseY - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < 120) {
                    const forceDirectionX = dx / distance;
                    const forceDirectionY = dy / distance;
                    const force = (120 - distance) / 120;
                    this.x -= forceDirectionX * force * this.density * 0.15;
                    this.y -= forceDirectionY * force * this.density * 0.15;
                }
                
                this.draw();
            }
        }

        function animateCanvas() {
            ctx.clearRect(0, 0, w, h);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            requestAnimationFrame(animateCanvas);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        animateCanvas();

        // --- 4. LÓGICA DEL FORMULARIO ---
        const inCode = document.getElementById('in-code');
        const inEmail = document.getElementById('in-email');
        const errorMsg = document.getElementById('error-msg');
        const portal = document.getElementById('portal');
        
        inCode.addEventListener('input', function(e) {
            let val = this.value.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
            if (val.length > 4) {
                val = val.substring(0, 4) + '-' + val.substring(4, 8);
            }
            this.value = val;
            
            this.classList.remove('char-flash');
            void this.offsetWidth; 
            if(val.length > 0) this.classList.add('char-flash');
        });

        function showError() {
            portal.classList.remove('shake');
            void portal.offsetWidth;
            portal.classList.add('shake');
            
            errorMsg.style.opacity = '1';
            setTimeout(() => { errorMsg.style.opacity = '0'; }, 3000);
        }

        function playSuccessAnimation() {
            const overlay = document.getElementById('success-overlay');
            const textContainer = document.getElementById('success-text');
            const msg = "Bienvenido a las sombras...";
            
            overlay.style.opacity = '1';
            document.body.style.backgroundColor = '#000';
            
            textContainer.innerHTML = '';
            setTimeout(() => {
                for (let i = 0; i < msg.length; i++) {
                    setTimeout(() => {
                        const span = document.createElement('span');
                        span.textContent = msg[i] === ' ' ? '\u00A0' : msg[i];
                        span.className = 'typed-char';
                        textContainer.appendChild(span);
                    }, i * 120);
                }
                
                setTimeout(() => {
                    textContainer.style.opacity = '0';
                    setTimeout(() => {
                        window.location.href = './dashboard.html';
                    }, 1000);
                }, msg.length * 120 + 2000);
            }, 1000);
        }

        function verificarAcceso() {
            const email = inEmail.value.trim().toLowerCase();
            const code = inCode.value.trim();
            
            if (!email || !code) return showError();

            const invs = JSON.parse(localStorage.getItem('invitaciones') || '[]');
            const inv = invs.find(i => i.codigo === code && i.activo);

            if (inv && (inv.email === '' || inv.email.toLowerCase() === email)) {
                let usuarios = JSON.parse(localStorage.getItem('usuarios_registrados') || '[]');
                let userMatch = usuarios.find(u => u.email === email);
                
                if (!userMatch) {
                    userMatch = {
                        email: email,
                        nombre: email.split('@')[0],
                        fechaRegistro: new Date().toISOString(),
                        ultimoAcceso: new Date().toISOString()
                    };
                    usuarios.push(userMatch);
                } else {
                    userMatch.ultimoAcceso = new Date().toISOString();
                }
                localStorage.setItem('usuarios_registrados', JSON.stringify(usuarios));

                // Guardar sesión
                sessionStorage.setItem('sesion', JSON.stringify({ email: email, nombre: userMatch.nombre }));

                if (inv.email !== '' && !inv.usado) {
                    inv.usado = true;
                    inv.fechaUso = new Date().toISOString();
                    localStorage.setItem('invitaciones', JSON.stringify(invs));
                }

                playSuccessAnimation();
            } else {
                showError();
            }
        }

        // Permitir Enter
        window.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verificarAcceso();
        });
    </script>
</body>
</html>
